# networks block declared globally to prevent compilation warnings
networks:
  riskwise-net:
    name: riskwise-net

services:
  # Hardened Docker Socket Firewall (Proxy)
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: riskwise-docker-proxy
    privileged: true # REQUIRED: Allows mounting docker.sock in strict SELinux contexts (like Fedora)
    networks:
      - riskwise-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro,z # Mounts host socket READ-ONLY with SELinux context
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1
      - INFO=1
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: riskwise-backend
    networks:
      - riskwise-net
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data:Z
      - ./backend/uploads:/app/uploads:Z
    environment:
      - DOCKER_HOST=tcp://riskwise-docker-proxy:2375
      - HOST_UPLOADS_DIR=${PWD}/backend/uploads
      # FIX: Passes the default compose network name so ZAP can join it cleanly
      - DOCKER_NETWORK_NAME=multi-scanner-fyp_default
      - JWT_SECRET=change-this-in-production-123
      - DOCKER_NETWORK_NAME=riskwise-net
    depends_on:
      - docker-proxy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: riskwise-frontend
    networks:
      - riskwise-net
    ports:
      # FIX: Maps host 5173 to Nginx Secure unprivileged HTTPS Port
      - "5173:8443"  
      # FIX: Maps host 8080 to Nginx unprivileged HTTP Port
      - "8080:8080"  
    depends_on:
      - backend
    restart: unless-stopped