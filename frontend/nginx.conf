# Redirect all HTTP traffic to HTTPS
server {
    listen 8080;
    server_name _;
    server_tokens off;
    # Redirect HTTP to host port 5173 over HTTPS
    return 301 https://$host:5173$request_uri;
}

# The Secure HTTPS Server
server {
    listen 8443 ssl;
    server_name _;
    server_tokens off;

    # Apply the self-signed certificates
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # FIX: Enforce a generous 100MB body ceiling for source code ZIP archives
    # This prevents Nginx from throwing 413 Request Entity Too Large on uploads
    client_max_body_size 200M;

    # STRICT SECURITY HEADERS
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy Routing with Dynamic DNS Resolution
    location /api {
        resolver 127.0.0.11 valid=30s;
        
        # Use a variable so Nginx doesn't check host resolution on boot
        set $backend http://riskwise-backend:8000;
        proxy_pass $backend; 
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Keep proxy body limits aligned
        client_max_body_size 100M;

        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        send_timeout 900s;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}